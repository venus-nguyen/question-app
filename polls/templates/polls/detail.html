{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vote</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-blue-100 to-purple-200 min-h-screen">

<!-- Navbar -->
<div class="bg-white shadow-md p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-blue-600">Question App </h1>
    <a href="/" class="text-gray-600 hover:text-blue-500">Home</a>
</div>

<!-- Card -->
<div class="max-w-xl mx-auto mt-12 bg-white p-8 rounded-3xl shadow-2xl">

    <form action="{% url 'polls:vote' question.id %}" method="post">
        {% csrf_token %}

        <!-- Title -->
        <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">
            {{ question.question_text }}
        </h2>

        <!-- Error -->
        {% if error_message %}
            <p class="text-red-500 text-center mb-4 font-medium">
                {{ error_message }}
            </p>
        {% endif %}

        <!-- Choices -->
        <div class="space-y-4">
            {% for choice in question.choice_set.all %}
                <label class="flex items-center p-4 border rounded-xl cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition">

                    <input 
                        type="radio" 
                        name="choice" 
                        value="{{ choice.id }}"
                        class="mr-4 accent-blue-500 scale-125"
                    >

                    <span class="text-gray-800 font-medium text-lg">
                        {{ choice.choice_text }}
                    </span>

                </label>
            {% endfor %}
        </div>

        <!-- Button -->
        <button 
            type="submit"
            class="w-full mt-8 bg-gradient-to-r from-blue-500 to-purple-500 text-white py-3 rounded-xl font-semibold text-lg hover:opacity-90 transition shadow-md"
        >
            Submit Vote 
        </button>

    </form>

</div>

</body>
</html>
