{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vote</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- Navbar -->
<div class="bg-blue-600 text-white p-4 text-center text-2xl font-bold shadow">
    Question App
</div>

<!-- Main -->
<div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded-2xl shadow-lg">

    <form action="{% url 'polls:vote' question.id %}" method="post">
        {% csrf_token %}

        <fieldset>

            <!-- Question -->
            <legend class="text-2xl font-semibold text-gray-800 mb-4 text-center">
                {{ question.question_text }}
            </legend>

            <!-- Error -->
            {% if error_message %}
                <p class="text-red-500 text-center mb-4 font-medium">
                    {{ error_message }}
                </p>
            {% endif %}

            <!-- Choices -->
            <div class="space-y-3">
                {% for choice in question.choice_set.all %}
                    <label class="flex items-center p-3 bg-gray-50 rounded-xl cursor-pointer hover:bg-blue-50 transition">
                        <input 
                            type="radio" 
                            name="choice" 
                            value="{{ choice.id }}"
                            class="mr-3"
                        >
                        <span class="text-gray-800 font-medium">
                            {{ choice.choice_text }}
                        </span>
                    </label>
                {% endfor %}
            </div>

        </fieldset>

        <!-- Button -->
        <button 
            type="submit"
            class="w-full mt-6 bg-blue-500 text-white py-2 rounded-xl font-semibold hover:bg-blue-600 transition"
        >
            Vote
        </button>

    </form>

</div>

</body>
</html>
