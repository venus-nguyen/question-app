{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Question App</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-blue-100 to-purple-200 min-h-screen">

<!-- Navbar -->
<div class="bg-white shadow-md p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-blue-600">Question App </h1>
</div>

<!-- Main -->
<div class="max-w-2xl mx-auto mt-10">

    <h2 class="text-3xl font-bold text-center text-gray-800 mb-8">
        Latest Questions
    </h2>

    {% if lastest_question_list %}
        <div class="space-y-5">
            {% for question in lastest_question_list %}
                
                <div class="bg-white p-5 rounded-2xl shadow-lg hover:shadow-2xl transition">
                    
                    <a href="{% url 'polls:detail' question.id %}" 
                       class="text-xl font-semibold text-gray-800 hover:text-blue-600">
                        {{ question.question_text }}
                    </a>

                </div>

            {% endfor %}
        </div>
    {% else %}
        <div class="text-center text-gray-600 bg-white p-6 rounded-xl shadow">
            No polls are available.
        </div>
    {% endif %}

</div>

</body>
</html>
