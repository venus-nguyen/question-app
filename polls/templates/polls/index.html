{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Question App</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- Navbar -->
<div class="bg-blue-600 text-white p-4 text-center text-2xl font-bold shadow">
    Question App
</div>

<!-- Main content -->
<div class="max-w-2xl mx-auto mt-10 bg-white p-6 rounded-2xl shadow-lg">

    <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">
        Latest Questions
    </h2>

    {% if lastest_question_list %}
        <ul class="space-y-4">
            {% for question in lastest_question_list %}
                <li class="p-4 bg-gray-50 rounded-xl shadow hover:bg-blue-50 transition">
                    <a href="{% url 'polls:detail' question.id %}" 
                       class="text-lg font-medium text-gray-800 hover:text-blue-600">
                        {{ question.question_text }}
                    </a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p class="text-center text-gray-500">
            No polls are available.
        </p>
    {% endif %}

</div>

</body>
</html>
