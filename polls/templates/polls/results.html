{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Results</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-green-100 to-blue-200 min-h-screen">

<!-- Navbar -->
<div class="bg-white shadow-md p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-green-600">Results </h1>
    <a href="/" class="text-gray-600 hover:text-green-500">Home</a>
</div>

<!-- Main -->
<div class="max-w-xl mx-auto mt-10 bg-white p-8 rounded-3xl shadow-2xl">

    <!-- Question -->
    <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">
        {{ question.question_text }}
    </h2>

    {% with total_votes=question.choice_set.all|length %}
    {% endwith %}

    <!-- Choices -->
    <div class="space-y-5">
        {% for choice in question.choice_set.all %}

            <div>
                <!-- Text -->
                <div class="flex justify-between mb-1">
                    <span class="text-gray-800 font-medium">
                        {{ choice.choice_text }}
                    </span>
                    <span class="text-gray-600">
                        {{ choice.votes }} vote{{ choice.votes|pluralize }}
                    </span>
                </div>

                <!-- Progress bar -->
                <div class="w-full bg-gray-200 rounded-full h-4">
                    <div 
                        class="bg-green-500 h-4 rounded-full transition-all duration-500"
                        style="width: {% widthratio choice.votes question.choice_set.all|length 100 %}%">
                    </div>
                </div>
            </div>

        {% endfor %}
    </div>

    <!-- Button -->
    <a href="{% url 'polls:detail' question.id %}" 
       class="block text-center mt-8 bg-green-500 text-white py-2 rounded-xl font-semibold hover:bg-green-600 transition">
        Vote again
    </a>

</div>

</body>
</html>
